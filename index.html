<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Škoda Pit Stop: a 2D arcade game. Steer Škoda cars into the station that matches their fuel before time runs out." />
  <meta name="theme-color" content="#0e3a2f" />
  <title>Škoda Pit Stop</title>
  <link rel="stylesheet" href="style.css?v=19" />
</head>
<body>
  <div id="game-wrapper">
    <header id="hud">
      <h1 id="game-title">Škoda Pit Stop</h1>
      <p id="instructions">Use ↑ / ↓ to steer the highlighted car into its matching station. Wrong station costs a life!</p>
    </header>

    <!-- Fixed logical resolution; CSS scales it down responsively. -->
    <canvas id="game-canvas" width="960" height="600"></canvas>
  </div>

  <!-- Single entry point; game.js wires everything together on load. -->
  <script src="game.js?v=20"></script>
</body>
</html>
